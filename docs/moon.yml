tasks:
  compile:
    command: 'typst compile main.typ bericht.pdf'
    inputs:
      - 'main.typ'
      - 'artifakte/**/*'
    outputs:
      - 'bericht.pdf'

  build:
    script: 'typst compile main.typ "Infomaniak - Risch und Merlo.pdf" && cp "Infomaniak - Risch und Merlo.pdf" ..'
    inputs:
      - 'main.typ'
      - 'artifakte/**/*'
    outputs:
      - 'Infomaniak - Risch und Merlo.pdf'

  check:
    command: 'typst compile main.typ /dev/null -f pdf'
    inputs:
      - 'main.typ'
      - 'artifakte/**/*'

  spellcheck:
    command: 'typos .'
    inputs:
      - '**/*.typ'
      - '**/*.md'
